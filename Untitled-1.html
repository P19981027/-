<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>古风AI文章生成器</title>
    <style>
        body {
            background: #f5f0e6;
            font-family: "宋体", serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }
        h1 {
            color: #8b0000;
            text-align: center;
        }
        #input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #8b0000;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
        }
        #output {
            width: 100%;
            height: 400px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>古风AI文章生成器</h1>
    <input id="input" placeholder="输入主题，如：江南烟雨、江湖侠义、边塞秋思、闺中情长">
    <button id="btn">一键生成古风文章</button>
    <div id="output"></div>

    <script>
        const btn=document.getElementById("btn");
        const input=document.getElementById("input");
        const output=document.getElementById("output");

        btn.addEventListener("click", async () => {
            const topic=input.value.trim();
            if (!topic) {
                alert("请输入主题");
                return;
            }
            const prompt = `请用纯正古风文笔写一篇文章，风格典雅、用词古雅、句式骈散结合，主题：${topic}`;
            try {
                const res=await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                const text=await res.text();
                output.innerText=text;
            } catch (e) {
                output.innerText = "生成失败，请重试";
            }
        });
    </script>
</body>
</html>
